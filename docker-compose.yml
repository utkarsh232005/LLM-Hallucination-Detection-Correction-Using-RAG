services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  rag-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rag-assistant
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - USER_AGENT=${USER_AGENT:-hallucination-rag/1.0}
      - HOST=0.0.0.0
      - PORT=8080
    networks:
      - rag-network
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - rag-network
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-data:/root/.ollama
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        echo "Initializing Ollama models..."
        sleep 5
        if ollama list | grep -q "nomic-embed-text"; then
          echo "nomic-embed-text already present, skipping pull."
        else
          echo "Pulling nomic-embed-text..."
          ollama pull nomic-embed-text
        fi
        if ollama list | grep -q "llama3.2:1b"; then
          echo "llama3.2:1b already present, skipping pull."
        else
          echo "Pulling llama3.2:1b..."
          ollama pull llama3.2:1b
        fi
        echo "Ollama model initialization complete."
    restart: "no"

networks:
  rag-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local
